name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Publish @gpichot/spectacle-deck
        if: contains(github.event.release.tag_name, 'spectacle-deck')
        working-directory: packages/spectacle-deck/dist
        run: pnpm publish --no-git-checks --provenance --access public

      - name: Publish vite-plugin-react-deck
        if: contains(github.event.release.tag_name, 'vite-plugin-react-deck')
        working-directory: packages/vite-plugin-react-deck/dist
        run: pnpm publish --no-git-checks --provenance --access public
