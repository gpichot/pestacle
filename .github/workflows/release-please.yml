name: Release Please

on:
  push:
    branches:
      - main

jobs:
  release-please:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    outputs:
      pr: ${{ steps.release.outputs.pr }}
      spectacle-deck--release_created:
        ${{ steps.release.outputs['packages/spectacle-deck--release_created'] }}
      vite-plugin-react-deck--release_created:
        ${{
        steps.release.outputs['packages/vite-plugin-react-deck--release_created']
        }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  format-changelog:
    needs: release-please
    if: ${{ needs.release-please.outputs.pr }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prettier --write '**/CHANGELOG.md'
      - name: Commit formatted changelogs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '**/CHANGELOG.md'
          git diff --staged --quiet || git commit -m "chore: format changelogs with prettier"
          git push

  publish:
    needs: release-please
    if: >-
      needs.release-please.outputs.spectacle-deck--release_created == 'true' ||
      needs.release-please.outputs.vite-plugin-react-deck--release_created ==
      'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build --filter='./packages/*'
      - name: Publish vite-plugin-react-deck
        if:
          needs.release-please.outputs.vite-plugin-react-deck--release_created
          == 'true'
        run: pnpm publish --no-git-checks --provenance
        working-directory: packages/vite-plugin-react-deck/dist
      - name: Publish spectacle-deck
        if:
          needs.release-please.outputs.spectacle-deck--release_created == 'true'
        run: pnpm publish --no-git-checks --provenance
        working-directory: packages/spectacle-deck/dist
